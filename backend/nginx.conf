# Nginx config for Viven Water DataCheck static JSON API
# Place at: /etc/nginx/sites-available/api.vivenwater.com
# Enable: ln -s /etc/nginx/sites-available/api.vivenwater.com /etc/nginx/sites-enabled/
# Reload:  nginx -t && systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name api.vivenwater.com;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name api.vivenwater.com;

    # SSL (Certbot will fill these in)
    ssl_certificate     /etc/letsencrypt/live/api.vivenwater.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.vivenwater.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Root: where generate.py writes the JSON files
    root /var/www/vivenwater/reports;

    # CORS — allow vivenwater.com frontend
    add_header Access-Control-Allow-Origin  "https://vivenwater.com" always;
    add_header Access-Control-Allow-Methods "GET, OPTIONS"           always;
    add_header Access-Control-Allow-Headers "Content-Type"           always;

    # Handle OPTIONS preflight
    if ($request_method = OPTIONS) {
        return 204;
    }

    # Cache static JSON for 1 hour on client, 24h on CDN/proxy
    add_header Cache-Control "public, max-age=3600, s-maxage=86400" always;

    # Serve /reports/90210.json at /reports/90210
    location /reports/ {
        try_files $uri $uri.json =404;

        # Correct MIME type for .json files
        types { }
        default_type application/json;

        # Gzip JSON responses
        gzip            on;
        gzip_types      application/json;
        gzip_min_length 256;
    }

    # Health check endpoint
    location /health {
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    # Block everything else
    location / {
        return 404 '{"error":"not found"}';
        add_header Content-Type application/json;
    }
}
